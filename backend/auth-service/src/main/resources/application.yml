server:
  port: ${FINEX_AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${FINEX_DB_URL:jdbc:mysql://localhost:3306/finex_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${FINEX_DB_USERNAME:root}
    password: ${FINEX_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    log-impl: ${FINEX_MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

finex:
  security:
    jwt-secret: ${FINEX_JWT_SECRET:}
  async:
    core-pool-size: ${FINEX_ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${FINEX_ASYNC_MAX_POOL_SIZE:8}
    queue-capacity: ${FINEX_ASYNC_QUEUE_CAPACITY:200}
    thread-name-prefix: ${FINEX_ASYNC_THREAD_NAME_PREFIX:finex-async-}
    await-termination-seconds: ${FINEX_ASYNC_AWAIT_TERMINATION_SECONDS:30}
  expense:
    attachments:
      storage-path: ${FINEX_EXPENSE_ATTACHMENT_STORAGE_PATH:${user.dir}/storage/expense-attachments}
    payment:
      receipt-query-cron: ${FINEX_EXPENSE_PAYMENT_RECEIPT_QUERY_CRON:0 0 9 * * *}
      receipt-query-zone: ${FINEX_EXPENSE_PAYMENT_RECEIPT_QUERY_ZONE:Asia/Shanghai}
  downloads:
    storage-path: ${FINEX_DOWNLOAD_STORAGE_PATH:${user.dir}/storage/downloads}

logging:
  level:
    com.finex: ${FINEX_LOG_LEVEL:info}
