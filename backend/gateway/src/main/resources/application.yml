server:
  port: ${FINEX_GATEWAY_PORT:8080}

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${FINEX_AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

logging:
  level:
    com.finex: ${FINEX_GATEWAY_LOG_LEVEL:info}
    org.springframework.cloud.gateway: ${FINEX_GATEWAY_FRAMEWORK_LOG_LEVEL:info}
